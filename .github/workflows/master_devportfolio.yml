name: Build and deploy Node.js app to Azure Web App - devportfolio

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: devportfolio-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create standalone deploy artifact
        run: |
          rm -rf deploy-portfolio
          mkdir -p deploy-portfolio

          # Copy standalone output and dereference symlinks
          rsync -aL .next/standalone/ deploy-portfolio/

          # Copy static assets and public folder into expected locations
          mkdir -p deploy-portfolio/.next
          rsync -a .next/static/ deploy-portfolio/.next/static/
          rsync -a public/ deploy-portfolio/public/

          cd deploy-portfolio && zip -r ../deploy-portfolio.zip . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-portfolio
          path: deploy-portfolio.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-portfolio

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "devportfolio"
          slot-name: "Production"
          package: deploy-portfolio.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C9C90C770C7B4613A7720F2894C8F64E }}
